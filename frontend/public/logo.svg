<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051c11" />
      <stop offset="60%" stop-color="#0a321e" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Teal Glow Gradient -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>

    <!-- Subtle Shadow -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Glow Ring -->
  <rect x="20" y="20" width="472" height="472" rx="108" fill="none" stroke="url(#accentGrad)" stroke-opacity="0.1" stroke-width="4" />

  <!-- Logo Graphics Group with Shadow -->
  <g filter="url(#dropShadow)">
    <!-- Notebook Base (Outer cover) -->
    <rect x="136" y="100" width="240" height="312" rx="24" fill="#1e293b" stroke="url(#accentGrad)" stroke-width="4" />
    
    <!-- Notebook Spine/Bindings (3 rings) -->
    <rect x="108" y="140" width="40" height="12" rx="6" fill="url(#accentGrad)" />
    <rect x="108" y="240" width="40" height="12" rx="6" fill="url(#accentGrad)" />
    <rect x="108" y="340" width="40" height="12" rx="6" fill="url(#accentGrad)" />

    <!-- Notebook Inner Pages (Layered effect) -->
    <rect x="160" y="116" width="200" height="280" rx="12" fill="#0f172a" />
    
    <!-- Decorative Note Lines -->
    <line x1="190" y1="170" x2="310" y2="170" stroke="#334155" stroke-width="6" stroke-linecap="round" />
    <line x1="190" y1="215" x2="270" y2="215" stroke="#334155" stroke-width="6" stroke-linecap="round" />
    <line x1="190" y1="260" x2="330" y2="260" stroke="#334155" stroke-width="6" stroke-linecap="round" />
    
    <!-- Glowing Sparkle / Tech Elements -->
    <path d="M 330 145 L 335 155 L 345 160 L 335 165 L 330 175 L 325 165 L 315 160 L 325 155 Z" fill="#34d399" filter="url(#glow)" />

    <!-- Big Checkmark / Dynamic Accent (Sleek check) -->
    <path d="M 210 320 L 250 360 L 350 240" fill="none" stroke="url(#tealGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  </g>
</svg>
